name: claude-print-opus
description: Claude Code (opus) via claude-print — subscription billing (cc_entrypoint=cli)
agent_cli: claude-print
version_command: "claude-print --version"
input_method:
  method: stdin
invoke_template: "cd {workspace} && /home/coding/.local/bin/claude-print --model {model} --max-turns 100 --output-format stream-json --dangerously-skip-permissions --no-inherit-hooks < {prompt_file}"
timeout_secs: 1200
provider: anthropic
model: opus
output_transform: needle-transform-claude
cost:
  type: use_or_lose
